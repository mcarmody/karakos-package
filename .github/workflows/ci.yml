name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Fast checks — runs in seconds, catches syntax and structure issues
  lint-and-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest

      - name: Check Python syntax (all scripts)
        run: |
          find bin/ system/ mcp/ -name '*.py' -exec python -m py_compile {} +

      - name: Check shell syntax (all scripts)
        run: |
          find . -name '*.sh' -not -path './.git/*' -exec bash -n {} +

      - name: Check Next.js route exports
        run: pytest tests/test_smoke_docker.py::TestNextjsRouteExports -v

      - name: Validate file structure
        run: pytest tests/test_smoke_docker.py::TestFileStructure -v

      - name: Validate setup script
        run: pytest tests/test_setup.py -v

  # Unit tests — tests core logic without Docker
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v -m "not slow" --tb=short

  # Docker build smoke test — catches Dockerfile and build issues
  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t karakos-test:smoke .

      # The image's ENTRYPOINT (bin/entrypoint.sh) requires DASHBOARD_PORT and
      # AGENT_SERVER_TOKEN to be set — those are runtime concerns, not build-
      # artifact checks. Override --entrypoint so each smoke test runs against
      # the image without going through the production startup path.

      - name: Verify dashboard built
        run: docker run --rm --entrypoint test karakos-test:smoke -d /workspace/dashboard/.next

      - name: Verify Python dependencies
        run: docker run --rm --entrypoint python3 karakos-test:smoke -c "import aiohttp, aiosqlite, discord; print('ok')"

      - name: Verify Node.js installed
        run: docker run --rm --entrypoint node karakos-test:smoke --version

  # Preflight script — tests bin/preflight.sh check logic via Python test suite
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest

      - name: Verify preflight.sh syntax
        run: bash -n bin/preflight.sh

      - name: Run preflight test suite
        run: pytest tests/test_preflight.py -v -m "not slow" --tb=short

  # Docker Compose validation
  compose-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The production config/.env is generated by the setup wizard and never
      # committed. For CI validation we only need the file to exist with the
      # required keys present — the values don't matter for `compose config`.
      - name: Create dummy env for validation
        run: |
          cat > config/.env <<'EOF'
          DASHBOARD_PORT=3000
          AGENT_SERVER_PORT=18791
          AGENT_SERVER_TOKEN=ci-validation-only
          TZ=UTC
          EOF

      - name: Validate docker-compose.yml
        run: docker compose -f config/docker-compose.yml config --quiet

      - name: Validate docker-compose.dev.yml overlay
        run: docker compose -f config/docker-compose.yml -f config/docker-compose.dev.yml config --quiet
