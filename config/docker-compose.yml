services:
  karakos:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file: .env
    volumes:
      - ..:/workspace
      - karakos-data:/workspace/data
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
      - "127.0.0.1:${AGENT_SERVER_PORT:-18791}:18791"
    restart: unless-stopped
    environment:
      - TZ=${TZ:-UTC}
    healthcheck:
      test: ["CMD", "curl", "-sf", "-H", "Authorization: Bearer ${AGENT_SERVER_TOKEN}", "http://localhost:18791/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    stop_grace_period: 45s
    entrypoint: ["/usr/bin/tini", "--", "/workspace/bin/entrypoint.sh"]

volumes:
  karakos-data:
